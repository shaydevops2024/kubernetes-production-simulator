---
# RegionWatch Deployment — PRIMARY cluster (kind-primary)
#
# 3 replicas on primary — it serves live traffic so we want redundancy.
# HPA can scale this based on CPU/memory in Phase 3 stretch goals.
#
# Apply to: kubectl --context kind-primary apply -f deployment-primary.yaml -n dr-system
apiVersion: apps/v1
kind: Deployment
metadata:
  name: regionwatch
  namespace: dr-system
  labels:
    app: regionwatch
    region: primary
spec:
  replicas: 3
  selector:
    matchLabels:
      app: regionwatch
  # Rolling update — zero downtime; always keep at least 2 pods running
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: regionwatch
        region: primary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "5000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: regionwatch
          image: regionwatch:v1
          imagePullPolicy: Never   # image loaded via: kind load docker-image
          ports:
            - containerPort: 5000
              name: http
          # Read non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: regionwatch-config
          # Add sensitive values from Secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: regionwatch-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://druser:$(POSTGRES_PASSWORD)@postgres:5432/regionwatch_db"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: regionwatch-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: regionwatch-secrets
                  key: MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
