---
# Secrets — applied to BOTH clusters
#
# In a real environment these would come from:
#   - AWS Secrets Manager / HashiCorp Vault
#   - Kubernetes External Secrets Operator
#   - Sealed Secrets
#
# Base64 values:
#   druser    → ZHJ1c2Vy
#   drpass    → ZHJwYXNz
#   minioadmin → bWluaW9hZG1pbg==
#
# To generate your own:
#   echo -n "yourpassword" | base64
apiVersion: v1
kind: Secret
metadata:
  name: regionwatch-secrets
  namespace: dr-system
  labels:
    app: regionwatch
type: Opaque
data:
  POSTGRES_USER:     ZHJ1c2Vy        # druser
  POSTGRES_PASSWORD: ZHJwYXNz        # drpass
  MINIO_ACCESS_KEY:  bWluaW9hZG1pbg==  # minioadmin
  MINIO_SECRET_KEY:  bWluaW9hZG1pbg==  # minioadmin
