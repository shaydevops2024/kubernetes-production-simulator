# ─────────────────────────────────────────────────────────────────────────────
# GitLab CI Pipeline — Multi-Region DR Deployment
# Project 11: Multi-Region Disaster Recovery System
#
# Pipeline stages:
#   1. validate   — Lint Dockerfiles and K8s manifests
#   2. build      — Build and push Docker image
#   3. deploy     — Deploy to primary cluster
#   4. verify     — Health check after primary deploy
#   5. sync       — Deploy to secondary cluster (stay in sync)
#   6. dr-test    — Nightly DR test (scheduled only)
#
# Required GitLab CI/CD Variables:
#   CI_REGISTRY              — container registry URL (GitLab: ci.registry.host)
#   CI_REGISTRY_USER         — registry username
#   CI_REGISTRY_PASSWORD     — registry password
#   KUBE_CONFIG_PRIMARY      — base64-encoded kubeconfig for primary cluster
#   KUBE_CONFIG_SECONDARY    — base64-encoded kubeconfig for secondary cluster
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - validate
  - build
  - deploy
  - verify
  - sync
  - dr-test

variables:
  IMAGE_NAME:    "$CI_REGISTRY_IMAGE/regionwatch"
  IMAGE_TAG:     "$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST:  "$CI_REGISTRY_IMAGE/regionwatch:latest"
  NAMESPACE:     "dr-system"

# ── Global before_script ──────────────────────────────────────────────────────
.setup-kubectl: &setup-kubectl
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - kubectl version --client

# ── 1. Validate ───────────────────────────────────────────────────────────────
lint-dockerfile:
  stage: validate
  image: hadolint/hadolint:latest-alpine
  script:
    - hadolint app/Dockerfile
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

lint-manifests:
  stage: validate
  image: alpine/k8s:1.28.0
  script:
    - |
      for f in solution/k8s/**/*.yaml; do
        echo "Checking $f..."
        kubectl apply --dry-run=client -f "$f" 2>/dev/null || true
      done
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# ── 2. Build ──────────────────────────────────────────────────────────────────
build-image:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" -t "${IMAGE_LATEST}" app/
    - docker push "${IMAGE_NAME}:${IMAGE_TAG}"
    - docker push "${IMAGE_LATEST}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH =~ /^release\//'

# ── 3. Deploy to Primary ──────────────────────────────────────────────────────
deploy-primary:
  stage: deploy
  image: alpine/k8s:1.28.0
  <<: *setup-kubectl
  script:
    # Set up kubeconfig for primary
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG_PRIMARY" | base64 -d > ~/.kube/config
    - kubectl config current-context

    # Apply all manifests
    - kubectl apply -f solution/k8s/namespace/namespace.yaml
    - kubectl apply -f solution/k8s/secrets/secrets.yaml -n $NAMESPACE
    - kubectl apply -f solution/k8s/configmaps/app-config-primary.yaml -n $NAMESPACE
    - kubectl apply -f solution/k8s/statefulsets/postgres-primary.yaml -n $NAMESPACE
    - kubectl apply -f solution/k8s/services/services.yaml -n $NAMESPACE

    # Update deployment image
    - |
      sed "s|regionwatch:v1|${IMAGE_NAME}:${IMAGE_TAG}|g" \
        solution/k8s/deployments/deployment-primary.yaml | kubectl apply -f - -n $NAMESPACE

    - kubectl apply -f solution/k8s/ingress/ingress.yaml -n $NAMESPACE

    # Wait for rollout
    - kubectl rollout status deployment/regionwatch -n $NAMESPACE --timeout=120s
  environment:
    name: production/primary
    url: http://primary.regionwatch.example.com
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'

# ── 4. Verify Primary ─────────────────────────────────────────────────────────
verify-primary:
  stage: verify
  image: alpine/k8s:1.28.0
  <<: *setup-kubectl
  script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG_PRIMARY" | base64 -d > ~/.kube/config

    # Port-forward and health check
    - kubectl port-forward svc/regionwatch 8080:80 -n $NAMESPACE &
    - PF_PID=$!
    - sleep 5

    - HEALTH=$(curl -sf http://localhost:8080/health || echo "")
    - kill $PF_PID || true

    - |
      if echo "$HEALTH" | grep -q '"status"'; then
        echo "Health check PASSED"
        echo "Response: $HEALTH"
      else
        echo "Health check FAILED"
        echo "Response: $HEALTH"
        exit 1
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'

# ── 5. Sync Secondary ────────────────────────────────────────────────────────
sync-secondary:
  stage: sync
  image: alpine/k8s:1.28.0
  <<: *setup-kubectl
  script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG_SECONDARY" | base64 -d > ~/.kube/config

    - kubectl apply -f solution/k8s/namespace/namespace.yaml
    - kubectl apply -f solution/k8s/secrets/secrets.yaml -n $NAMESPACE
    - kubectl apply -f solution/k8s/configmaps/app-config-secondary.yaml -n $NAMESPACE
    - kubectl apply -f solution/k8s/statefulsets/postgres-secondary.yaml -n $NAMESPACE
    - kubectl apply -f solution/k8s/services/services.yaml -n $NAMESPACE

    - |
      sed "s|regionwatch:v1|${IMAGE_NAME}:${IMAGE_TAG}|g" \
        solution/k8s/deployments/deployment-secondary.yaml | kubectl apply -f - -n $NAMESPACE

    - kubectl apply -f solution/k8s/ingress/ingress.yaml -n $NAMESPACE
    - kubectl rollout status deployment/regionwatch -n $NAMESPACE --timeout=120s
  environment:
    name: production/secondary
    url: http://secondary.regionwatch.example.com
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'

# ── 6. Nightly DR Test ───────────────────────────────────────────────────────
dr-test-full:
  stage: dr-test
  image: alpine/k8s:1.28.0
  <<: *setup-kubectl
  script:
    - mkdir -p ~/.kube
    - echo "$KUBE_CONFIG_PRIMARY" | base64 -d > ~/.kube/config

    # Install velero CLI
    - |
      VELERO_VERSION="v1.13.0"
      curl -fsSL "https://github.com/vmware-tanzu/velero/releases/download/${VELERO_VERSION}/velero-${VELERO_VERSION}-linux-amd64.tar.gz" | tar -xz
      mv "velero-${VELERO_VERSION}-linux-amd64/velero" /usr/local/bin/

    # Trigger a fresh backup
    - BACKUP_NAME="ci-dr-test-${CI_PIPELINE_ID}"
    - velero backup create "$BACKUP_NAME" --include-namespaces $NAMESPACE --wait

    # Switch to secondary context
    - echo "$KUBE_CONFIG_SECONDARY" | base64 -d > ~/.kube/config

    # Delete namespace on secondary (simulate disaster)
    - kubectl delete namespace $NAMESPACE --ignore-not-found --wait=true

    # Restore
    - velero restore create "ci-restore-${CI_PIPELINE_ID}" --from-backup "$BACKUP_NAME" --wait

    # Measure RTO
    - START_TIME=$(date +%s)
    - kubectl wait --for=condition=ready pod -l app=regionwatch -n $NAMESPACE --timeout=300s
    - END_TIME=$(date +%s)
    - RTO=$((END_TIME - START_TIME))
    - echo "RTO achieved: ${RTO}s (target: 300s)"
    - |
      if [ $RTO -le 300 ]; then
        echo "✓ RTO within SLA"
      else
        echo "✗ RTO exceeded SLA"
        exit 1
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'   # only run on scheduled pipelines
  allow_failure: false
  artifacts:
    reports:
      junit: dr-test-results.xml
    when: always
    expire_in: 30 days
