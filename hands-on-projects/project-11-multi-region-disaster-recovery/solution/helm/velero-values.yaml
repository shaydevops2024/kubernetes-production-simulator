# Velero Helm Chart Values
# Install with:
#   helm repo add vmware-tanzu https://vmware-tanzu.github.io/helm-charts
#   helm repo update
#   helm install velero vmware-tanzu/velero \
#     --namespace velero \
#     --create-namespace \
#     --values velero-values.yaml \
#     --kube-context kind-primary
#
# Repeat with --kube-context kind-secondary for the secondary cluster.
# Change backupStorageLocation.config.s3Url to your MinIO address.

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.9.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero
      default: true
      config:
        region: minio
        s3ForcePathStyle: "true"
        # CHANGE THIS: replace with your host machine IP
        s3Url: "http://host.docker.internal:9000"

  volumeSnapshotLocation:
    - name: default
      provider: aws
      config:
        region: minio

credentials:
  useSecret: true
  name: velero-minio-credentials
  secretContents:
    cloud: |
      [default]
      aws_access_key_id = minioadmin
      aws_secret_access_key = minioadmin

schedules:
  dr-system-backup:
    disabled: false
    schedule: "*/15 * * * *"
    template:
      includedNamespaces:
        - dr-system
      ttl: "48h0m0s"
      snapshotVolumes: false
      defaultVolumesToFsBackup: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Enable metrics for Prometheus scraping
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
