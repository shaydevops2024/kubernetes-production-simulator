---
# RegionWatch Deployment — SECONDARY cluster (kind-secondary)
#
# 2 replicas on secondary — it's on standby so fewer replicas is acceptable.
# Scale up to 3 BEFORE or DURING failover using:
#   kubectl --context kind-secondary scale deployment regionwatch --replicas=3 -n dr-system
#
# Apply to: kubectl --context kind-secondary apply -f deployment-secondary.yaml -n dr-system
apiVersion: apps/v1
kind: Deployment
metadata:
  name: regionwatch
  namespace: dr-system
  labels:
    app: regionwatch
    region: secondary
spec:
  replicas: 2
  selector:
    matchLabels:
      app: regionwatch
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: regionwatch
        region: secondary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "5000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: regionwatch
          image: regionwatch:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          envFrom:
            - configMapRef:
                name: regionwatch-config
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: regionwatch-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: regionwatch-secrets
                  key: MINIO_SECRET_KEY
            - name: DATABASE_URL
              value: "postgresql://druser:drpass@postgres:5432/regionwatch_db"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
