---
# MinIO Deployment — standalone backup storage
#
# In this project, MinIO runs OUTSIDE the clusters (as a Docker container)
# so both Kind clusters can reach it at host.docker.internal:9000.
#
# This manifest is provided as an ALTERNATIVE if you want MinIO inside a cluster.
# Only deploy this to ONE cluster and expose it as a NodePort.
#
# Note: In production, use a managed S3 service (AWS S3, GCS, Azure Blob).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: dr-system
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: "minioadmin"
            - name: MINIO_ROOT_PASSWORD
              value: "minioadmin"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: minio-data
          emptyDir: {}   # For production, use a PVC
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: dr-system
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
      nodePort: 30900
    - name: console
      port: 9001
      targetPort: 9001
      nodePort: 30901
  type: NodePort
