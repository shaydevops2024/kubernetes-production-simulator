services:

  # ── MinIO — S3-compatible backup storage ─────────────────────────────────────
  # Simulates cloud object storage (AWS S3 / GCS / Azure Blob).
  # Velero will be configured to store cluster backups here.
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"     # MinIO API  — used by Velero / aws CLI
      - "9001:9001"     # MinIO Console — web UI http://localhost:9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── MinIO bucket setup (one-shot job) ────────────────────────────────────────
  # Creates the "velero" bucket and "dr-backups" bucket on first run.
  minio-setup:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/velero &&
        mc mb --ignore-existing local/dr-backups &&
        echo 'Buckets ready: velero, dr-backups' &&
        exit 0
      "
    restart: "no"

  # ── PostgreSQL — Primary database ────────────────────────────────────────────
  # The authoritative write database — primary region reads/writes here.
  # In production this would use streaming replication to the secondary.
  postgres-primary:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     druser
      POSTGRES_PASSWORD: drpass
      POSTGRES_DB:       regionwatch_db
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druser -d regionwatch_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── PostgreSQL — Secondary database (replica simulation) ─────────────────────
  # In this local setup it is a separate instance to simulate a cross-region replica.
  # In production you would use pg_basebackup + streaming replication.
  postgres-secondary:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     druser
      POSTGRES_PASSWORD: drpass
      POSTGRES_DB:       regionwatch_db
    volumes:
      - postgres-secondary-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druser -d regionwatch_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── App — Primary region ──────────────────────────────────────────────────────
  # Simulates the application running in your PRIMARY region.
  # Theme: blue  •  Active by default.
  app-primary:
    build:
      context: ../app
      dockerfile: Dockerfile
    environment:
      REGION_NAME:       eu-west-1
      REGION_ROLE:       primary
      APP_VERSION:       v1
      APP_ENV:           production
      DATABASE_URL:      postgresql://druser:drpass@postgres-primary:5432/regionwatch_db
      MINIO_ENDPOINT:    http://minio:9000
      MINIO_ACCESS_KEY:  minioadmin
      MINIO_SECRET_KEY:  minioadmin
    depends_on:
      postgres-primary:
        condition: service_healthy
    ports:
      - "5860:5000"    # Direct access to PRIMARY — http://localhost:5860
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── App — Secondary region ────────────────────────────────────────────────────
  # Simulates the application running in your SECONDARY (DR) region.
  # Theme: gray/standby  •  Ready to become active on failover.
  app-secondary:
    build:
      context: ../app
      dockerfile: Dockerfile
    environment:
      REGION_NAME:       us-east-1
      REGION_ROLE:       secondary
      APP_VERSION:       v1
      APP_ENV:           production
      DATABASE_URL:      postgresql://druser:drpass@postgres-secondary:5432/regionwatch_db
      REPLICA_DB_URL:    postgresql://druser:drpass@postgres-primary:5432/regionwatch_db
      MINIO_ENDPOINT:    http://minio:9000
      MINIO_ACCESS_KEY:  minioadmin
      MINIO_SECRET_KEY:  minioadmin
    depends_on:
      postgres-secondary:
        condition: service_healthy
    ports:
      - "5861:5000"    # Direct access to SECONDARY — http://localhost:5861
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── nginx — Traffic router ────────────────────────────────────────────────────
  # Acts as the "global load balancer" / DNS entry point.
  # By default routes all traffic to app-primary.
  # Edit nginx/nginx.conf → proxy_pass to "secondary_region" → reload to simulate failover.
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "5858:80"      # <<< THE LIVE PORT — http://localhost:5858
    depends_on:
      app-primary:
        condition: service_healthy
      app-secondary:
        condition: service_healthy
    restart: unless-stopped

volumes:
  minio-data:
  postgres-primary-data:
  postgres-secondary-data:
