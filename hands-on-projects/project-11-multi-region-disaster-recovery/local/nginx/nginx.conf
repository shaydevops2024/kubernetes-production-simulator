# ─────────────────────────────────────────────────────────────────────────────
# nginx traffic router for Multi-Region DR simulation
#
# PORT 5858 — "live" port (simulates external load balancer pointing to primary)
#
# To simulate a failover: change the proxy_pass in the "live" server to
# point to app-secondary instead of app-primary, then run:
#   docker compose exec nginx nginx -s reload
#
# Direct access (no nginx):
#   http://localhost:5860  ← app-primary
#   http://localhost:5861  ← app-secondary
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
}

http {
    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream primary_region {
        server app-primary:5000;
    }

    upstream secondary_region {
        server app-secondary:5000;
    }

    # ── Health check log format ───────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" rt=$request_time';

    # ── LIVE port (port 5858) ─────────────────────────────────────────────────
    # This is the "production" entry point.
    # By default it routes to app-primary (simulating primary region active).
    #
    # TO SIMULATE FAILOVER: change proxy_pass to http://secondary_region;
    # and reload: docker compose exec nginx nginx -s reload
    server {
        listen 80;
        server_name _;

        access_log /var/log/nginx/access.log main;

        location / {
            proxy_pass         http://primary_region;   # ← CHANGE to secondary_region to failover
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # Healthcheck endpoint for nginx itself
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
