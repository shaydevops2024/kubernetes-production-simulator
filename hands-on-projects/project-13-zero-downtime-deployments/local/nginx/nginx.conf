events {
    worker_connections 1024;
}

http {
    # ──────────────────────────────────────────────────────────────────────────
    # Traffic splitting between v1 (blue) and v2 (green)
    #
    # LEARNING EXERCISE:
    #   Edit the weights/down flags below to simulate different strategies:
    #
    #   100% v1 (default — v2 marked down = receives no traffic):
    #     server app-v1:4545 weight=10;
    #     server app-v2:4545 down;
    #
    #   Canary start (~9% v2):
    #     server app-v1:4545 weight=10;
    #     server app-v2:4545 weight=1;
    #
    #   50/50:
    #     server app-v1:4545 weight=10;
    #     server app-v2:4545 weight=10;
    #
    #   100% v2 (v1 marked down):
    #     server app-v1:4545 down;
    #     server app-v2:4545 weight=10;
    #
    #   Blue-Green (instant switch):
    #     Flip which server has `down` in one step
    #
    # After editing, apply with:   docker compose restart nginx-lb
    # ──────────────────────────────────────────────────────────────────────────
    upstream app_backend {
        server app-v1:4545 weight=10;   # ← blue  (currently receives 100 % of traffic)
        server app-v2:4545 down;        # ← green (currently receives 0 % of traffic)
    }

    # Pass-through for per-version Prometheus scraping
    upstream app_v1_direct { server app-v1:4545; }
    upstream app_v2_direct { server app-v2:4545; }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    server {
        listen 80;
        server_name _;

        # Add response header so you can see which upstream answered
        add_header X-Served-By $upstream_addr always;

        location / {
            proxy_pass         http://app_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
    }
}
