# PrometheusRule — alert rules managed by the Prometheus Operator.
# These appear in the Prometheus UI under Alerts, and fire to Alertmanager.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: deploy-insight-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus
spec:
  groups:
    - name: zero-downtime.deployments
      interval: 30s
      rules:

        # ── Canary error rate gate ────────────────────────────────────────────
        # Same threshold used by AnalysisTemplate — 5% error rate for 1 minute.
        # Fires as an alert even outside a rollout (e.g. production regression).
        - alert: HighErrorRate
          expr: |
            (
              sum(rate(app_errors_total[1m]))
              /
              sum(rate(app_requests_total[1m]))
            ) * 100 > 5
          for: 1m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Error rate > 5% on deploy-insight"
            description: >
              Current error rate: {{ $value | printf "%.1f" }}%.
              Argo Rollouts will automatically roll back the active canary if this persists.

        # ── High latency ──────────────────────────────────────────────────────
        - alert: HighLatency
          expr: |
            histogram_quantile(0.95,
              sum(rate(app_request_duration_seconds_bucket[5m])) by (le)
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P95 latency > 1 s on deploy-insight"
            description: "P95 latency is {{ $value | printf \"%.2f\" }}s — check for resource pressure."

        # ── Pod not ready ─────────────────────────────────────────────────────
        - alert: PodNotReady
          expr: |
            kube_pod_status_ready{namespace="zero-downtime", condition="true"} == 0
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} not ready in zero-downtime namespace"
