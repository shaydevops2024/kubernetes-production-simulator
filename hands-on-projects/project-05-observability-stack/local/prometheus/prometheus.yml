global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: local

# Send alerts to AlertManager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Load alerting rules
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:

  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape our application — this is where http_requests_total, app_active_sessions etc. come from
  - job_name: 'observe-app'
    static_configs:
      - targets: ['observe-app:8000']
    metrics_path: '/metrics'
    scrape_interval: 5s    # Faster scrape so you see changes quickly

  # Scrape AlertManager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
