apiVersion: apps/v1
kind: Deployment
metadata:
  name: observe-app
  namespace: observability
  labels:
    app: observe-app
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: observe-app
  template:
    metadata:
      labels:
        app: observe-app
        version: "1.0.0"
      annotations:
        # Prometheus will also scrape this pod directly (in addition to ServiceMonitor)
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: observe-app
          # Replace with your actual image after building:
          # docker build -t your-registry/observe-app:1.0.0 hands-on-projects/project-05-observability-stack/app/
          image: observe-app:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: observe-app-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false   # App writes to /tmp for file serving
      terminationGracePeriodSeconds: 30
