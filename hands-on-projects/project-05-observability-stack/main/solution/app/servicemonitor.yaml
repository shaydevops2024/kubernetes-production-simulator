# ServiceMonitor tells the Prometheus Operator to scrape observe-app.
# The Prometheus Operator watches for ServiceMonitor resources and
# automatically updates the Prometheus scrape configuration.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: observe-app
  namespace: observability
  labels:
    app: observe-app
    # Must match the serviceMonitorSelector in kube-prometheus-stack values
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      monitoring: "true"
  namespaceSelector:
    matchNames:
      - observability
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
