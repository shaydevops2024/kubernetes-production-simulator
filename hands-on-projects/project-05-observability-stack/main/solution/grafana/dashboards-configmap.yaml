# Grafana Dashboard ConfigMap
#
# Grafana's sidecar (enabled in kube-prometheus-stack values) watches for ConfigMaps
# with the label "grafana_dashboard: 1" and automatically loads them as dashboards.
#
# The dashboard JSON below is identical to the local/ version.

apiVersion: v1
kind: ConfigMap
metadata:
  name: observe-app-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
    app: observe-app
data:
  observe-app-overview.json: |
    {
      "annotations": {"list": []},
      "description": "ObserveApp — Application Performance Overview",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "fillOpacity": 10, "lineWidth": 2, "showPoints": "never"},
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 14, "x": 0, "y": 0},
          "id": 1,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"observe-app\"}[1m])) by (status)",
              "legendFormat": "status={{status}}",
              "refId": "A"
            }
          ],
          "title": "HTTP Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "max": 100, "min": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 5}, {"color": "red", "value": 20}]},
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 5, "x": 14, "y": 0},
          "id": 2,
          "options": {"orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [
            {
              "expr": "100 * sum(rate(http_requests_total{job=\"observe-app\",status=~\"5.+\"}[5m])) / (sum(rate(http_requests_total{job=\"observe-app\"}[5m])) > 0 or vector(0.001))",
              "legendFormat": "Error Rate",
              "refId": "A"
            }
          ],
          "title": "Error Rate %",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.995}, {"color": "red", "value": 0.999}]}, "unit": "percentunit", "min": 0.98, "max": 1}, "overrides": []},
          "gridPos": {"h": 8, "w": 5, "x": 19, "y": 0},
          "id": 3,
          "options": {"colorMode": "background", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [
            {
              "expr": "1 - (sum(rate(http_requests_total{job=\"observe-app\",status=~\"5.+\"}[30m])) / sum(rate(http_requests_total{job=\"observe-app\"}[30m])))",
              "legendFormat": "Availability",
              "refId": "A"
            }
          ],
          "title": "SLO: 30m Availability",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "custom": {"drawStyle": "line", "fillOpacity": 5, "lineWidth": 2, "showPoints": "never"}, "unit": "eps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 4,
          "options": {"legend": {"displayMode": "list", "placement": "bottom", "showLegend": true}},
          "targets": [
            {
              "expr": "sum(rate(app_events_tracked_total{job=\"observe-app\"}[1m])) by (event_type)",
              "legendFormat": "{{event_type}}",
              "refId": "A"
            }
          ],
          "title": "Events Tracked by Type",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.1}, {"color": "red", "value": 0.5}]}, "unit": "s"}, "overrides": []},
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 8},
          "id": 5,
          "options": {"colorMode": "background", "graphMode": "none", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"observe-app\"}[5m])) by (le))",
              "legendFormat": "p99",
              "refId": "A"
            }
          ],
          "title": "P99 Latency",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}, "unit": "none"}, "overrides": []},
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 8},
          "id": 6,
          "options": {"colorMode": "value", "graphMode": "area", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "targets": [{"expr": "app_active_sessions", "legendFormat": "Sessions", "refId": "A"}],
          "title": "Active Sessions",
          "type": "stat"
        },
        {
          "datasource": {"type": "loki", "uid": "loki"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 11, "w": 24, "x": 0, "y": 16},
          "id": 7,
          "options": {"dedupStrategy": "none", "enableLogDetails": true, "prettifyLogMessage": true, "showTime": true, "sortOrder": "Descending"},
          "targets": [{"expr": "{namespace=\"observability\", container=\"observe-app\"}", "refId": "A"}],
          "title": "Application Logs",
          "type": "logs"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 38,
      "tags": ["observability", "demo"],
      "time": {"from": "now-30m", "to": "now"},
      "timezone": "browser",
      "title": "ObserveApp Overview",
      "uid": "observe-app-overview",
      "version": 1
    }
