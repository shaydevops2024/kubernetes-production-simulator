# Thanos Object Store Secret
#
# This secret tells Thanos where to store long-term metrics.
# Edit the values below for your environment before applying.
#
# For MinIO (running in-cluster):
#   - Change bucket, endpoint, access_key, secret_key
#
# For AWS S3:
#   - Change type to "S3", set bucket, region, access_key, secret_key
#
# Apply:
#   kubectl apply -f thanos/object-store-secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: thanos-object-store
  namespace: observability
type: Opaque
stringData:
  objstore.yml: |
    type: S3
    config:
      bucket: thanos-metrics
      endpoint: minio.observability.svc.cluster.local:9000
      access_key: "minio-admin"
      secret_key: "minio-secret-change-me"
      insecure: true
      signature_version2: false
