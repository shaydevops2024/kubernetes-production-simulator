# PagerDuty Integration Key Secret
#
# Create a PagerDuty service with a "Prometheus" integration.
# Copy the Integration Key and set it below.
#
# Apply:
#   kubectl create secret generic pagerduty-key \
#     --from-literal=routingKey=YOUR_PAGERDUTY_INTEGRATION_KEY \
#     --namespace observability
#
# OR apply this file after editing (less secure — avoid committing real keys):

apiVersion: v1
kind: Secret
metadata:
  name: pagerduty-key
  namespace: observability
type: Opaque
stringData:
  # Replace with your real PagerDuty Prometheus integration key
  routingKey: "YOUR_PAGERDUTY_INTEGRATION_KEY_HERE"
