# ArgoCD Application — kube-prometheus-stack (Prometheus + Grafana + AlertManager)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "58.*"
    helm:
      releaseName: monitoring
      valueFiles:
        - $platform_gitops/phase-7-observability/kube-prometheus-stack-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true    # required for CRDs in kube-prometheus-stack
