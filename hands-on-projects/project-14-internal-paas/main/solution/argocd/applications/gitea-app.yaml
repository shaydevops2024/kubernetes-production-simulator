# ArgoCD Application — Gitea Git hosting
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://dl.gitea.com/charts/
    chart: gitea
    targetRevision: "10.*"
    helm:
      releaseName: gitea
      valueFiles:
        - $platform_gitops/phase-2-registry-gitea/gitea/gitea-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
