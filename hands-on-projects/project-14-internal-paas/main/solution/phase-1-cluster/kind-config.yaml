# Kind cluster config for Project 14 — Internal PaaS
# Creates: 1 control-plane + 3 worker nodes
# - extraPortMappings: exposes port 80/443 on host so ingress works
# - containerdConfigPatches: trusts the local Harbor registry
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: paas

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  - role: worker
    labels:
      node-role: worker

  - role: worker
    labels:
      node-role: worker

  - role: worker
    labels:
      node-role: worker

# Tell containerd (the container runtime inside Kind nodes) to trust
# the local Harbor registry at harbor.internal.
# This allows pods to pull images from Harbor without TLS cert errors.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      [plugins."io.containerd.grpc.v1.cri".registry.mirrors]
        [plugins."io.containerd.grpc.v1.cri".registry.mirrors."harbor.internal"]
          endpoint = ["http://harbor.internal"]
      [plugins."io.containerd.grpc.v1.cri".registry.configs]
        [plugins."io.containerd.grpc.v1.cri".registry.configs."harbor.internal".tls]
          insecure_skip_verify = true
