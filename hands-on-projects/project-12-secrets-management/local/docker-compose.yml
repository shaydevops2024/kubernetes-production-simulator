version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Project 12: Enterprise Secrets Management Platform
#
# Services:
#   vault        — HashiCorp Vault (dev mode, token=root)
#   postgres     — PostgreSQL (target for dynamic credentials)
#   vault-init   — One-shot container that configures Vault on startup
#   dashboard    — Vault Dashboard UI (http://localhost:5555)
#
# Access:
#   Dashboard UI:  http://localhost:5555
#   Vault UI:      http://localhost:8200/ui  (token: root)
#   Vault API:     http://localhost:8200
#   PostgreSQL:    localhost:5432
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── HashiCorp Vault ──────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.15.6
    container_name: vault
    hostname: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
      # In dev mode, Vault starts unsealed with an in-memory backend.
      # NEVER use dev mode in production.
    cap_add:
      - IPC_LOCK    # Required by Vault to prevent secrets from being swapped to disk
    volumes:
      - vault-logs:/vault/logs
    command: vault server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - secrets-net

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    hostname: postgres
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: vault_admin          # Vault connects with this user
      POSTGRES_PASSWORD: vault_admin_password
      # Vault will create/drop temporary users via this admin account
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_admin -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - secrets-net

  # ── Vault Initialization ──────────────────────────────────────────────────────
  # This runs once, configures all Vault engines, then exits.
  vault-init:
    image: hashicorp/vault:1.15.6
    container_name: vault-init
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root"
    volumes:
      - ./vault/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - secrets-net
    restart: "no"

  # ── Vault Dashboard ────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ../app
      dockerfile: Dockerfile
    container_name: vault-dashboard
    hostname: vault-dashboard
    ports:
      - "5555:5555"
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root"
      PORT: "5555"
    depends_on:
      vault:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5555/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - secrets-net

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local
  vault-logs:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  secrets-net:
    driver: bridge
    name: secrets-management
