---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-dashboard
  namespace: secrets-management
  labels:
    app: vault-dashboard
---
# This ServiceAccount is used by the dashboard pod to authenticate to Vault
# via the Kubernetes auth method.
# Vault will validate the ServiceAccount JWT token against the K8s API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault
  namespace: secrets-management
  labels:
    app: vault
---
# Secret to hold the ServiceAccount token for older K8s versions
# (K8s 1.24+ generates tokens on demand, but Vault may need a long-lived one)
apiVersion: v1
kind: Secret
metadata:
  name: vault-dashboard-token
  namespace: secrets-management
  annotations:
    kubernetes.io/service-account.name: vault-dashboard
type: kubernetes.io/service-account-token
