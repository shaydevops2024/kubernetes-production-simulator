apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-dashboard
  namespace: secrets-management
  labels:
    app: vault-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-dashboard
  template:
    metadata:
      labels:
        app: vault-dashboard
      annotations:
        # ── Vault Agent Injector annotations ──────────────────────────────
        # These tell the Vault Agent Injector (installed with the Helm chart)
        # to inject secrets into this pod at /vault/secrets/
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "dashboard-role"
        # Inject app/config secret as an env file
        vault.hashicorp.com/agent-inject-secret-app-config: "secret/data/app/config"
        vault.hashicorp.com/agent-inject-template-app-config: |
          {{- with secret "secret/data/app/config" -}}
          APP_NAME={{ .Data.data.app_name }}
          ENV={{ .Data.data.env }}
          LOG_LEVEL={{ .Data.data.log_level }}
          {{- end }}
    spec:
      serviceAccountName: vault-dashboard
      containers:
        - name: vault-dashboard
          image: vault-dashboard:latest  # Build locally: docker build -t vault-dashboard ./app
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5555
          env:
            - name: VAULT_ADDR
              value: "http://vault.secrets-management.svc.cluster.local:8200"
            - name: PORT
              value: "5555"
            # Option A: Static token (simple for learning, not production)
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-dashboard-token
                  key: token
                  optional: true  # Fall back to Vault Agent if this secret doesn't exist
          readinessProbe:
            httpGet:
              path: /health
              port: 5555
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5555
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
