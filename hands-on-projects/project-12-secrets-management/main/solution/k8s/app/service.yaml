apiVersion: v1
kind: Service
metadata:
  name: vault-dashboard
  namespace: secrets-management
  labels:
    app: vault-dashboard
spec:
  selector:
    app: vault-dashboard
  ports:
    - name: http
      port: 5555
      targetPort: 5555
      nodePort: 30555   # Access via http://localhost:30555 on Kind
  type: NodePort
