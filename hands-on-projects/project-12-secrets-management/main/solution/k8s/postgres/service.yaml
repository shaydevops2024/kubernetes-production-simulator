apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: secrets-management
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  # ClusterIP: only accessible within the cluster
  # Vault and the dashboard connect to postgres:5432
  type: ClusterIP
