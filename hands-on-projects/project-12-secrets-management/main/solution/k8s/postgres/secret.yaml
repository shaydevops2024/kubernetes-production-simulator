apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: secrets-management
  labels:
    app: postgres
type: Opaque
stringData:
  # These are the admin credentials that Vault uses to connect to PostgreSQL
  # and create/drop dynamic users. The app itself never sees these.
  POSTGRES_USER: vault_admin
  POSTGRES_PASSWORD: vault_admin_password_change_in_prod
  POSTGRES_DB: appdb
