# Green Deployment — v2, the new version being deployed
# Starts at 0 replicas — scaled up only when the pipeline runs.
# Gets traffic ONLY after health checks + smoke tests pass.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploytrack-green
  namespace: blue-green
  labels:
    app: deploytrack
    color: green
    version: v2
spec:
  replicas: 0    # ← starts at zero, CI scales this up
  selector:
    matchLabels:
      app: deploytrack
      color: green
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: deploytrack
        color: green
        version: v2
    spec:
      containers:
      - name: deploytrack
        image: your-registry/deploytrack:v2    # replace with your image
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: APP_COLOR
          value: "green"
        - name: APP_VERSION
          value: "v2"
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: db-secret
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
          successThreshold: 1
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
