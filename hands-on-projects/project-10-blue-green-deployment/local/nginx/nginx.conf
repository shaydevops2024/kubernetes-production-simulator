events {
    worker_connections 1024;
}

http {

    # ── Active environment upstream ────────────────────────────────────────────
    # To switch traffic: comment/uncomment the server lines below, then run:
    #   docker compose exec nginx nginx -s reload
    #
    # BLUE  = v1  (current live)
    # GREEN = v2  (new version, already running)

    upstream active {
        server app-blue:5000;
        # server app-green:5000;   # ← switch here for blue→green cutover
    }

    # ── Blue-only upstream (for testing before switch) ─────────────────────────
    upstream blue {
        server app-blue:5000;
    }

    # ── Green-only upstream (test new version before switching live) ───────────
    upstream green {
        server app-green:5000;
    }

    # ── Main entry point (port 4455) ───────────────────────────────────────────
    # This is what your "users" hit. Routes to the active upstream.
    server {
        listen 80;
        server_name localhost;

        # Health check endpoint for nginx itself
        location /nginx-health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }

        # Proxy everything to the active environment
        location / {
            proxy_pass         http://active;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;

            # Add a response header so you can see which upstream served the request
            add_header X-Served-By "active-upstream" always;
        }
    }

}
