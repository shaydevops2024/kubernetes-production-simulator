# OpenFaaS Helm values
# Full reference: https://github.com/openfaas/faas-netes/blob/master/chart/openfaas/values.yaml

# Expose gateway via NodePort (works with Kind/Minikube)
# Change to LoadBalancer for cloud clusters
serviceType: NodePort

# Enable basic auth (required)
basic_auth: true
generateBasicAuth: false   # We create the secret manually in install script

# Scale to zero — the key serverless feature
# Requires the faas-idler component
faasIdler:
  replicate: 1
  inactivityDuration: 30s    # Scale to zero after 30s idle
  reconcileInterval: 120s

# Function namespace
functionNamespace: openfaas-fn

# Gateway settings
gateway:
  replicas: 1
  readTimeout: "65s"
  writeTimeout: "65s"
  upstreamTimeout: "60s"
  resources:
    requests:
      memory: "120Mi"
      cpu: "50m"

# Queue worker (handles async invocations)
queueWorker:
  replicas: 1
  ackWait: "60s"
  resources:
    requests:
      memory: "120Mi"
      cpu: "50m"

# NATS (message bus for async)
nats:
  channel: "faas-request"
  streamReplication: 1

# Prometheus (metrics for auto-scaling)
prometheus:
  create: true

# AlertManager (triggers scale-up/down)
alertmanager:
  create: true
