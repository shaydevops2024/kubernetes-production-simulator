apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: function-runner-hpa
  namespace: faashub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: function-runner
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 2
        periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
