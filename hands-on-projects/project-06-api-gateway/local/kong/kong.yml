_format_version: "3.0"
_transform: true

# ============================================================
#  GatewayHub — Kong Declarative Configuration (DB-less)
#  This file defines ALL Kong configuration:
#  services, routes, plugins, and consumers
# ============================================================

services:
  # ── Backend API Service ──────────────────────────────────
  - name: api-service
    url: http://api-service:8001
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000
    retries: 3

  # ── Analytics Service ────────────────────────────────────
  - name: analytics-service
    url: http://analytics-service:8002
    connect_timeout: 10000
    read_timeout: 30000
    write_timeout: 30000
    retries: 2

routes:
  # ── Auth routes (no auth required) ──────────────────────
  - name: auth-route
    service: api-service
    paths:
      - /auth
    strip_path: false
    preserve_host: false

  # ── Health route (no auth required) ─────────────────────
  - name: health-route
    service: api-service
    paths:
      - /health
    strip_path: false
    methods:
      - GET

  # ── API v1 Products — Public, rate limited ───────────────
  - name: api-v1-products-public
    service: api-service
    paths:
      - /v1/products
    strip_path: false
    methods:
      - GET
    plugins:
      - name: rate-limiting
        config:
          minute: 10
          policy: redis
          redis_host: redis
          redis_port: 6379
          fault_tolerant: true
          hide_client_headers: false
          error_code: 429
          error_message: "Rate limit exceeded. You have sent too many requests. Please wait a minute."

  # ── API v1 Protected — JWT required ──────────────────────
  - name: api-v1-protected
    service: api-service
    paths:
      - /v1/users
      - /v1/orders
    strip_path: false
    plugins:
      - name: jwt
        config:
          secret_is_base64: false
          key_claim_name: iss
          claims_to_verify:
            - exp
      - name: rate-limiting
        config:
          minute: 30
          limit_by: consumer
          policy: redis
          redis_host: redis
          redis_port: 6379
          fault_tolerant: true
          hide_client_headers: false

  # ── API v2 — JWT required, enhanced response ─────────────
  - name: api-v2
    service: api-service
    paths:
      - /v2
    strip_path: false
    plugins:
      - name: jwt
        config:
          secret_is_base64: false
          key_claim_name: iss
          claims_to_verify:
            - exp
      - name: rate-limiting
        config:
          minute: 60
          limit_by: consumer
          policy: redis
          redis_host: redis
          redis_port: 6379
          fault_tolerant: true
      - name: request-transformer
        config:
          add:
            headers:
              - "X-API-Version:2.0"
              - "X-Enhanced-Response:true"
          remove:
            headers: []

  # ── Analytics routes (no auth, internal use) ─────────────
  - name: analytics-route
    service: analytics-service
    paths:
      - /analytics
    strip_path: false

# ── Global Plugins ────────────────────────────────────────
plugins:
  # CORS — allow browser requests
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
        - X-API-Version
      exposed_headers:
        - X-RateLimit-Limit-minute
        - X-RateLimit-Remaining-minute
        - X-RateLimit-Reset
        - X-Kong-Upstream-Latency
        - X-Kong-Proxy-Latency
        - X-API-Version
        - X-Enhanced-Response
        - X-Consumer-ID
        - X-Consumer-Username
      max_age: 3600
      preflight_continue: false

  # Prometheus — expose /metrics for Prometheus scraping
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

  # Request ID — add unique ID to every request
  - name: request-transformer
    config:
      add:
        headers:
          - "X-Gateway:GatewayHub/Kong"
          - "X-Environment:local-dev"

# ── Consumers ─────────────────────────────────────────────
consumers:
  # Free-tier user consumer
  - username: demo-user
    jwt_secrets:
      - key: demo-user-key
        secret: gateway-demo-secret-key-2024
        algorithm: HS256

  # Premium user consumer
  - username: premium-user
    jwt_secrets:
      - key: premium-user-key
        secret: gateway-demo-secret-key-2024
        algorithm: HS256
