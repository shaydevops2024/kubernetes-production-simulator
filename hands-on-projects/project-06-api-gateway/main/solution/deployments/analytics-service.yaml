apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: api-gateway
  labels:
    app: analytics-service
    project: gatewayhub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        project: gatewayhub
    spec:
      containers:
        - name: analytics-service
          image: analytics-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8002
              name: http
          env:
            - name: KONG_ADMIN_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KONG_ADMIN_URL
            - name: API_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: API_SERVICE_URL
            - name: PORT
              value: "8002"
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
