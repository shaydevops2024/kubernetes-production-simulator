apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limiting-public
  namespace: api-gateway
  annotations:
    kubernetes.io/ingress.class: kong
plugin: rate-limiting
config:
  minute: 10
  policy: redis
  redis_host: redis
  redis_port: 6379
  fault_tolerant: true
  hide_client_headers: false
  error_code: 429
  error_message: "Rate limit exceeded. Please wait a minute before retrying."
