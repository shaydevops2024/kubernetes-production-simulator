apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limiting-consumer
  namespace: api-gateway
  annotations:
    kubernetes.io/ingress.class: kong
plugin: rate-limiting
config:
  minute: 60
  limit_by: consumer
  policy: redis
  redis_host: redis
  redis_port: 6379
  fault_tolerant: true
  hide_client_headers: false
