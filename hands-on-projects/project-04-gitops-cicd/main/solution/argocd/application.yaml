apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: projects-hub
  namespace: argocd
spec:
  project: default
  source:
    # Point this at your GitOps manifests repo
    repoURL: https://github.com/shaydevops2024/your-gitops-repo
    targetRevision: HEAD
    path: manifests/projects-hub   # folder in the gitops repo containing your K8s manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-cicd
  syncPolicy:
    automated:
      prune: true       # delete resources removed from Git
      selfHeal: true    # revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true
