name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/projects-hub

jobs:

  # ── 1. Test ─────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest app/tests/ -v --tb=short

  # ── 2. Build & Push ─────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.vars.outputs.short-sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "short-sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.short-sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Scan ──────────────────────────────────────────────────
  scan:
    name: Security Scan (Trivy)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.short-sha }}
          format: table
          exit-code: '1'           # Fail the pipeline if HIGH/CRITICAL CVEs are found
          ignore-unfixed: true     # Ignore CVEs without an available fix
          severity: HIGH,CRITICAL

  # ── 4. Promote (update GitOps repo) ─────────────────────────
  promote:
    name: Update GitOps Manifests
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps manifests repo
        uses: actions/checkout@v4
        with:
          repository: shaydevops2024/your-gitops-repo   # ← replace with your gitops repo name
          token: ${{ secrets.GITOPS_TOKEN }}       # ← PAT with repo write access
          path: gitops

      - name: Update image tag in deployment manifest
        run: |
          sed -i \
            "s|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.short-sha }}|" \
            gitops/manifests/projects-hub/deployment.yaml

      - name: Commit and push manifest update
        working-directory: gitops
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/projects-hub/deployment.yaml
          git commit -m "ci: update projects-hub to ${{ needs.build-and-push.outputs.short-sha }}"
          git push
