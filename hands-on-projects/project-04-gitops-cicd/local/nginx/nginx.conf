# ── Canary Traffic Splitting ─────────────────────────────────
# Simulates Flagger's progressive delivery locally.
# Adjust the `weight` values to change the traffic split:
#   - weight=90 / weight=10  → 90% v1, 10% v2  (canary start)
#   - weight=50 / weight=50  → 50/50 split       (mid-rollout)
#   - weight=0  / weight=100 → all v2             (complete)

upstream app_canary {
    # Stable (v1)
    server app-v1:8080 weight=8;

    # Canary (v2) — receives ~80% of traffic
    server app-v2:8080 weight=2;
}

server {
    listen 80;
    server_name _;

    # ── Main app ─────────────────────────────────────────────
    location / {
        proxy_pass         http://app_canary;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Expose which upstream handled the request
        add_header X-Upstream-Addr $upstream_addr always;
        add_header X-Upstream-Status $upstream_status always;
    }

    # ── Health check (direct, bypasses canary) ───────────────
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
