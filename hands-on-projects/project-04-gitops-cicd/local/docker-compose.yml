version: '3.9'

# ============================================================
#  DevOps Projects Hub — Canary Simulation Stack
#  Run: docker compose up --build
#  UI:  http://localhost:8181   (load balanced: v1 + v2)
#
#  This setup runs two versions simultaneously with nginx
#  splitting traffic between them — simulating what Flagger
#  does in Kubernetes before you touch a cluster.
# ============================================================

services:

  # ── App v1 (stable) ─────────────────────────────────────────
  # Simulates the current production deployment
  app-v1:
    build:
      context: ../app
      dockerfile: Dockerfile
      args:
        APP_VERSION: v1
        BUILD_DATE: "2025-01-01T00:00:00Z"
        GIT_COMMIT: "abc1234"
    environment:
      APP_VERSION: v1
      ENVIRONMENT: local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── App v2 (canary) ─────────────────────────────────────────
  # Simulates the new version being rolled out progressively
  app-v2:
    build:
      context: ../app
      dockerfile: Dockerfile
      args:
        APP_VERSION: v2
        BUILD_DATE: "2025-02-01T00:00:00Z"
        GIT_COMMIT: "def5678"
    environment:
      APP_VERSION: v2
      ENVIRONMENT: local
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── nginx — Canary Load Balancer ────────────────────────────
  # Splits traffic between v1 (90%) and v2 (10%)
  # Edit nginx.conf to change the weight ratio
  gateway:
    image: nginx:alpine
    ports:
      - "8181:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app-v1:
        condition: service_healthy
      app-v2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
