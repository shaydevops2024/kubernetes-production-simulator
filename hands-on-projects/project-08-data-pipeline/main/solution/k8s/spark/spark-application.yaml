apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: data-pipeline
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-role
  namespace: data-pipeline
rules:
  - apiGroups: [""]
    resources: [pods, services, configmaps, persistentvolumeclaims]
    verbs: [create, get, list, watch, delete, update, patch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-role-binding
  namespace: data-pipeline
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: data-pipeline
roleRef:
  kind: Role
  name: spark-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: sensor-processor
  namespace: data-pipeline
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "registry.gitlab.com/YOUR_ORG/data-pipeline/pipeline-processor:latest"
  imagePullPolicy: Always
  mainApplicationFile: "local:///app/main.py"
  sparkVersion: "3.5.1"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 5
    onFailureRetryInterval: 15
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20
  sparkConf:
    "spark.sql.shuffle.partitions": "6"
    "spark.streaming.stopGracefullyOnShutdown": "true"
    "spark.kubernetes.executor.deleteOnTermination": "true"
    "spark.metrics.conf.*.sink.prometheusServlet.class": "org.apache.spark.metrics.sink.PrometheusServlet"
    "spark.metrics.conf.*.sink.prometheusServlet.path": "/metrics/prometheus"
  driver:
    cores: 1
    memory: "1g"
    memoryOverhead: "512m"
    labels:
      version: "1.0.0"
      app: sensor-processor
    serviceAccount: spark
    env:
      - name: KAFKA_BOOTSTRAP_SERVERS
        value: "pipeline-kafka-kafka-bootstrap.data-pipeline.svc:9092"
      - name: KAFKA_TOPIC
        value: "sensor-events"
      - name: KAFKA_GROUP_ID
        value: "spark-processor"
      - name: TIMESCALE_USER
        valueFrom:
          secretKeyRef:
            name: timescale-secret
            key: user
      - name: TIMESCALE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: timescale-secret
            key: password
      - name: TIMESCALE_URL
        valueFrom:
          secretKeyRef:
            name: timescale-secret
            key: jdbc_url
      - name: WINDOW_DURATION
        value: "5 seconds"
      - name: TRIGGER_INTERVAL
        value: "5 seconds"
  executor:
    cores: 2
    instances: 2
    memory: "2g"
    memoryOverhead: "512m"
    labels:
      version: "1.0.0"
      app: sensor-processor
    env:
      - name: TIMESCALE_USER
        valueFrom:
          secretKeyRef:
            name: timescale-secret
            key: user
      - name: TIMESCALE_PASSWORD
        valueFrom:
          secretKeyRef:
            name: timescale-secret
            key: password
