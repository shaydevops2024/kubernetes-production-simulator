apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-pipeline
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    project: data-pipeline
    managed-by: argocd
spec:
  project: default
  source:
    repoURL: https://gitlab.com/YOUR_ORG/data-pipeline.git
    targetRevision: main
    path: solution/helm/data-pipeline
    helm:
      releaseName: data-pipeline
      valueFiles:
        - values.yaml
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: data-pipeline
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: data-pipeline-project
  namespace: argocd
spec:
  description: Data Pipeline project
  sourceRepos:
    - "https://gitlab.com/YOUR_ORG/data-pipeline.git"
    - "https://strimzi.io/charts/"
    - "https://kubeflow.github.io/spark-operator"
  destinations:
    - namespace: data-pipeline
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
