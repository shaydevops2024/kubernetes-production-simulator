# Default values for data-pipeline Helm chart

global:
  namespace: data-pipeline
  imageRegistry: "registry.gitlab.com/YOUR_ORG/data-pipeline"
  imageTag: "latest"
  imagePullPolicy: Always

# ── Kafka (via Strimzi) ──────────────────────────────────────────────────────
kafka:
  operator:
    enabled: true
  cluster:
    name: pipeline-kafka
    replicas: 3
    version: "3.6.0"
    storage:
      size: 20Gi
      class: gp2
    resources:
      requests:
        memory: 2Gi
        cpu: 500m
      limits:
        memory: 4Gi
        cpu: "2"
  topic:
    name: sensor-events
    partitions: 6
    replicas: 3
    retentionMs: 86400000

# ── Spark ────────────────────────────────────────────────────────────────────
spark:
  operator:
    enabled: true
  application:
    name: sensor-processor
    driver:
      cores: 1
      memory: "1g"
    executor:
      cores: 2
      instances: 2
      memory: "2g"
    windowDuration: "5 seconds"
    triggerInterval: "5 seconds"

# ── TimescaleDB ───────────────────────────────────────────────────────────────
timescaledb:
  replicas: 1
  storage:
    size: 20Gi
    class: gp2
  credentials:
    database: pipeline
    user: pipeline
    password: pipeline123   # Override via --set or Vault in production

# ── Pipeline Producer ─────────────────────────────────────────────────────────
producer:
  replicas: 1
  image: pipeline-producer
  eventsPerSecond: 10
  numSensors: 50
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 500m

# ── Dashboard ─────────────────────────────────────────────────────────────────
dashboard:
  replicas: 2
  image: pipeline-dashboard
  ingress:
    enabled: true
    host: pipeline.example.com
    ingressClass: nginx
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 250m

# ── Autoscaling (KEDA) ────────────────────────────────────────────────────────
autoscaling:
  keda:
    enabled: true
    lagThreshold: 5000
    minReplicas: 2
    maxReplicas: 10

# ── Monitoring ────────────────────────────────────────────────────────────────
monitoring:
  enabled: true
  prometheusRules: true
  grafanaDashboards: true

# ── Security ──────────────────────────────────────────────────────────────────
security:
  networkPolicies: true
  vault:
    enabled: false
    address: "http://vault.vault.svc:8200"
    role: "data-pipeline"
