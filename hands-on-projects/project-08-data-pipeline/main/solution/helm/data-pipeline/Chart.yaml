apiVersion: v2
name: data-pipeline
description: Real-Time Data Pipeline — Kafka + Spark + TimescaleDB on Kubernetes
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - kafka
  - spark
  - timescaledb
  - data-pipeline
  - streaming
maintainers:
  - name: platform-team
dependencies:
  - name: strimzi-kafka-operator
    version: "0.39.0"
    repository: https://strimzi.io/charts/
    condition: kafka.operator.enabled
  - name: spark-operator
    version: "1.3.3"
    repository: https://kubeflow.github.io/spark-operator
    condition: spark.operator.enabled
