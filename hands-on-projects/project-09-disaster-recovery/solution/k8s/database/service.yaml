# Headless service for postgres-primary (required by StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: dr-lab
  labels:
    app: postgres-primary
    tier: database
spec:
  selector:
    app: postgres-primary
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  clusterIP: None  # Headless — stable DNS: postgres-primary-0.postgres-primary.dr-lab.svc.cluster.local
---
# Headless service for postgres-secondary
apiVersion: v1
kind: Service
metadata:
  name: postgres-secondary
  namespace: dr-lab
  labels:
    app: postgres-secondary
    tier: database
spec:
  selector:
    app: postgres-secondary
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  clusterIP: None
