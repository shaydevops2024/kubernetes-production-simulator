apiVersion: apps/v1
kind: Deployment
metadata:
  name: dr-app
  namespace: dr-lab
  labels:
    app: dr-app
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dr-app
  template:
    metadata:
      labels:
        app: dr-app
        version: v1
    spec:
      containers:
      - name: dr-app
        image: dr-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 4545
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: POSTGRES_PASSWORD
        - name: DATABASE_URL
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-primary.dr-lab.svc.cluster.local:5432/dr_primary"
        - name: DATABASE_SECONDARY_URL
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres-secondary.dr-lab.svc.cluster.local:5432/dr_secondary"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_SECRET_KEY
        envFrom:
        - configMapRef:
            name: app-config
        readinessProbe:
          httpGet:
            path: /health
            port: 4545
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 4545
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        resources:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 256Mi
            cpu: 200m
