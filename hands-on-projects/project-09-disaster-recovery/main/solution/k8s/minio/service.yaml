apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: dr-lab
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  clusterIP: None  # Headless for StatefulSet DNS
---
# NodePort to expose MinIO console externally (for local access)
apiVersion: v1
kind: Service
metadata:
  name: minio-console
  namespace: dr-lab
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
  - name: console
    port: 9001
    targetPort: 9001
    nodePort: 30901
  type: NodePort
